parameters:
- name: deploymentType
  type: string
  default: dev
  values:
  - dev
  - preview
  - prod
- name: dependsOn
  type: object
  default: []

stages:
- stage: generate_release_data_${{ parameters.deploymentType }}
  displayName: Generate release data (${{ parameters.deploymentType }})
  dependsOn: ${{ parameters.dependsOn }}
  jobs:
  - template: templates/generate-release-line-files.yaml@release_tools
    parameters:
      azureSubscription: 'ProductionServicesSubscription'
      environment: '${{ parameters.deploymentType }}'
      productMetadataDir: '$(Build.SourcesDirectory)/_productMetadata'

- stage: upload_${{ parameters.deploymentType }}
  displayName: Upload artifacts (${{ parameters.deploymentType }})
  dependsOn:
  - generate_release_data_${{ parameters.deploymentType }}
  jobs:
  - deployment: upload
    ${{ if eq(parameters.deploymentType, 'dev') }}:
      environment: 'development'
      displayName: Upload to dev
    ${{ if eq(parameters.deploymentType, 'preview') }}:
      environment: 'preview'
      displayName: Upload to preview
    ${{ if eq(parameters.deploymentType, 'prod') }}:
      environment: 'production'
      displayName: Upload to production
    pool:
      vmImage: 'ubuntu-22.04'
    strategy:
      runOnce:
        deploy:
          steps:
          - template: templates/checkout.yaml@release_tools
          - template: templates/upload-artifacts.yaml@release_tools
            parameters:
              azureSubscription: 'ProductionServicesSubscription'
              environment: '${{ parameters.deploymentType }}'

- stage: promote_${{ parameters.deploymentType }}
  displayName: Promote artifacts (${{ parameters.deploymentType }})
  dependsOn:
  - upload_${{ parameters.deploymentType }}
  jobs:
  - job: promote
    displayName: Promote (${{ parameters.deploymentType }})
    pool:
      vmImage: 'ubuntu-22.04'
    steps:
    - template: templates/checkout.yaml@release_tools
    - template: templates/promote-artifacts.yaml@release_tools
      parameters:
        azureSubscription: 'ProductionServicesSubscription'
        environment: '${{ parameters.deploymentType }}'

- stage: cdn_purge_${{ parameters.deploymentType }}
  displayName: CDN purge (${{ parameters.deploymentType }})
  dependsOn:
  - promote_${{ parameters.deploymentType }}
  jobs:
  - job: cdn_purge
    displayName: CDN purge (${{ parameters.deploymentType }})
    pool:
      vmImage: 'ubuntu-22.04'
    steps:
    - template: templates/checkout.yaml@release_tools
    - template: templates/cdn-purge.yaml@release_tools
      parameters:
        azureSubscription: 'ProductionServicesSubscription'
        environment: '${{ parameters.deploymentType }}'
