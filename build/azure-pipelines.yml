parameters:
- name: devMode
  type: boolean
  displayName: 'Dev mode (skip MS signing, dev deployment only)'
  default: false
- name: enableSecurityScans
  type: boolean
  displayName: 'Enable security scans (CodeQL + dependency)'
  default: true

resources:
  repositories:
  - repository: release_tools
    type: git
    name: release-tools/release-tools
    ref: refs/heads/master
  - repository: docs
    type: github
    name: lithnet/ad-password-protection-docs
    endpoint: github-connection

pool:
  vmImage: 'windows-latest'

variables:
  - group: github-app-variables
  - name: buildPlatform
    value: 'x64'
  - name: buildConfiguration
    value: 'Release'
  - name: build.version.major
    value: 1
  - name: build.version.minor
    value: 1
  - name: build.version.revision
    value: $[counter(format('{0}.{1}', variables['build.version.major'], variables['build.version.minor']), 0)]
  - name: build.version
    value: $(build.version.major).$(build.version.minor).$(build.version.revision)
  - name: build.date
    value: $[format('{0:yyyy}-{0:MM}-{0:dd}T{0:HH}:{0:mm}:{0:ss}', pipeline.startTime)]
  - name: installer.fileName
    value: 'LithnetPasswordProtection-$(build.version).exe'
  - name: build.isRelease
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/heads/release/') }}

name: $(build.version.major).$(build.version.minor).$(build.version.revision)
trigger: none

stages:
# ── Validate product metadata ───────────────────────────────────────────
- template: templates/validate-release-metadata-stage.yaml@release_tools

# ── Security scans (CodeQL → GitHub Security tab) ─────────────────────
- ${{ if eq(parameters.enableSecurityScans, true) }}:
  - stage: security_scans
    displayName: Security Scans
    dependsOn: []
    jobs:
    - job: codeql_scan
      displayName: CodeQL analysis
      pool:
        vmImage: 'windows-latest'
      steps:
      - checkout: self
        fetchDepth: 0

      - task: NuGetToolInstaller@1

      - task: NuGetCommand@2
        displayName: Restore solution
        inputs:
          restoreSolution: 'src/Lithnet.ActiveDirectory.PasswordProtection.sln'

      - task: PowerShell@2
        displayName: Download CodeQL CLI
        inputs:
          targetType: inline
          script: |
            $codeqlDir = "$(Agent.ToolsDirectory)\codeql"
            if (Test-Path "$codeqlDir\codeql.exe")
            {
                Write-Host "CodeQL already present at $codeqlDir"
            }
            else
            {
                $release = Invoke-RestMethod "https://api.github.com/repos/github/codeql-action/releases/latest"
                $bundle = $release.assets | Where-Object { $_.name -match "codeql-bundle-win64" } | Select-Object -First 1
                if (-not $bundle)
                {
                    throw "Could not find CodeQL bundle asset in latest release"
                }
                Write-Host "Downloading $($bundle.name)..."
                $zipPath = "$(Agent.TempDirectory)\codeql-bundle.tar.gz"
                Invoke-WebRequest -Uri $bundle.browser_download_url -OutFile $zipPath
                Write-Host "Extracting..."
                tar -xzf $zipPath -C "$(Agent.ToolsDirectory)"
            }
            Write-Host "##vso[task.prependpath]$codeqlDir"

      - task: PowerShell@2
        displayName: Create CodeQL databases (C# + C++)
        inputs:
          targetType: inline
          script: |
            $dbCluster = "$(Agent.TempDirectory)\codeql-dbs"
            $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
            Write-Host "MSBuild path: $msbuild"
            $buildScript = Join-Path "$(Agent.TempDirectory)" "codeql-build.cmd"
            Set-Content -Path $buildScript -Value "`"$msbuild`" src\Lithnet.ActiveDirectory.PasswordProtection.sln /t:rebuild /p:Platform=$(buildPlatform) /p:Configuration=$(buildConfiguration)"
            Write-Host "Build script contents:"
            Get-Content $buildScript
            codeql database create $dbCluster --db-cluster --language=csharp,cpp --command=$buildScript --overwrite
            if ($LASTEXITCODE -ne 0) { throw "CodeQL database creation failed" }
            Write-Host "##vso[task.setvariable variable=codeqlDbCluster]$dbCluster"

      - task: PowerShell@2
        displayName: Acquire GitHub App token
        inputs:
          targetType: filePath
          filePath: '$(Build.SourcesDirectory)/build/scripts/Get-GitHubAppToken.ps1'
          arguments: -ClientId "$(github.app.client-id)" -PrivateKeyPem "$(github.app.private-key)" -Repository "lithnet/ad-password-protection"
          pwsh: true

      - task: PowerShell@2
        displayName: Analyze and upload results
        inputs:
          targetType: inline
          script: |
            $cluster = "$(codeqlDbCluster)"
            $token = "$(GitHubAppToken)"
            $repo = "lithnet/ad-password-protection"
            $ref = "$(Build.SourceBranch)"
            $commit = "$(Build.SourceVersion)"

            Write-Host "== Token diagnostics =="
            Write-Host "Token length: $($token.Length)"
            Write-Host "Token prefix: $($token.Substring(0, [Math]::Min(4, $token.Length)))..."
            Write-Host "Ref: $ref"
            Write-Host "Commit: $commit"

            Write-Host "== Testing token against GitHub API =="
            try
            {
                $headers = @{ Authorization = "Bearer $token"; Accept = "application/vnd.github+json" }
                $repoInfo = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo" -Headers $headers
                Write-Host "Token works - repo: $($repoInfo.full_name)"
            }
            catch
            {
                Write-Host "Token test FAILED: $($_.Exception.Message)"
                Write-Host "Response: $($_.ErrorDetails.Message)"
                throw "GitHub token is invalid - cannot proceed with upload"
            }

            Write-Host "== Testing code-scanning permission =="
            try
            {
                $alerts = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/code-scanning/alerts?per_page=1" -Headers $headers
                Write-Host "Code scanning access confirmed"
            }
            catch
            {
                Write-Host "Code scanning access FAILED: $($_.Exception.Message)"
                Write-Host "Response: $($_.ErrorDetails.Message)"
                Write-Host "The GitHub App may be missing 'Code scanning alerts: Write' permission"
                throw "Token lacks code-scanning permission"
            }

            foreach ($lang in @("csharp", "cpp"))
            {
                $dbPath = Join-Path $cluster $lang
                $sarifPath = "$(Agent.TempDirectory)\codeql-results-$lang.sarif"
                Write-Host "Analyzing $lang..."
                codeql database analyze $dbPath --format=sarif-latest --output=$sarifPath "$lang-security-extended"
                if ($LASTEXITCODE -ne 0) { throw "CodeQL analysis failed for $lang" }
                Write-Host "Uploading $lang results to GitHub..."
                $token | codeql github upload-results --sarif=$sarifPath --repository=$repo --ref=$ref --commit=$commit --github-auth-stdin
                if ($LASTEXITCODE -ne 0) { throw "CodeQL upload failed for $lang" }
            }
            Write-Host "All results uploaded to GitHub Security tab."

# ── Build ──────────────────────────────────────────────────────────────
- stage: build_stage
  displayName: Build
  dependsOn: [validate_metadata]
  jobs:
  - job: build_job
    displayName: Build all projects
    steps:
    - template: templates/checkout.yaml@release_tools

    - task: PowerShell@2
      displayName: Set RC version
      inputs:
        targetType: 'inline'
        script: |
          $file = "$(Build.SourcesDirectory)/src/PasswordFilter/passwordfilter.rc"
          $content = Get-Content $file

          $pattern1 = '(?<=VALUE "(FileVersion|ProductVersion)", ")[^"]+'
          $myVersion1 = "$(build.version).0"

          $pattern2 = '(?<=\b(FILEVERSION|PRODUCTVERSION)\b )\d+(,\d+)+'
          $myVersion2 = "$(build.version.major),$(build.version.minor),$(build.version.revision),0"

          $content = $content -replace $pattern1, $myVersion1 -replace $pattern2, $myVersion2
          $content | Set-Content $file
          Get-Content $file
        failOnStderr: true

    - task: NuGetToolInstaller@1

    - task: NuGetCommand@2
      displayName: Restore solution
      inputs:
        restoreSolution: 'src/Lithnet.ActiveDirectory.PasswordProtection.sln'

    - task: VSBuild@1
      displayName: Build solution
      inputs:
        solution: 'src/Lithnet.ActiveDirectory.PasswordProtection.sln'
        platform: '$(buildPlatform)'
        configuration: '$(buildConfiguration)'

    - task: PowerShell@2
      displayName: Copy filter DLL to staging
      inputs:
        targetType: inline
        script: |
          Copy-Item "D:\build\lpp\filter\lithnetpwdf.dll" "$(Build.ArtifactStagingDirectory)\" -Force
          Copy-Item "D:\build\lpp\filter\lithnetpwdf.pdb" "$(Build.ArtifactStagingDirectory)\" -Force
          Copy-Item "D:\build\lpp\filter\messages.dll" "$(Build.ArtifactStagingDirectory)\" -Force

    - task: PowerShell@2
      displayName: Locate native test DLL
      inputs:
        targetType: inline
        script: |
          $dll = Get-ChildItem "$(Build.SourcesDirectory)\src" -Recurse -Filter "NativeUnitTests.dll" | Select-Object -First 1
          if (-not $dll) { throw "NativeUnitTests.dll not found" }
          Write-Host "Found: $($dll.FullName)"
          Write-Host "##vso[task.setvariable variable=NativeTestDir]$($dll.DirectoryName)"

    - task: PublishPipelineArtifact@1
      displayName: Publish native test binaries
      inputs:
        targetPath: '$(NativeTestDir)'
        artifact: 'native_test_binaries'
        publishLocation: 'pipeline'

    - task: PublishPipelineArtifact@1
      displayName: Publish managed test binaries
      inputs:
        targetPath: 'src\ManagedUnitTests\bin\x64\Release'
        artifact: 'managed_test_binaries'
        publishLocation: 'pipeline'

    - task: PublishPipelineArtifact@1
      displayName: Publish PS module for test store setup
      inputs:
        targetPath: 'src\PasswordProtectionPS\bin\x64\Release\net472\win-x64'
        artifact: 'ps_module_binaries'
        publishLocation: 'pipeline'

    - task: PublishSymbols@2
      displayName: Publish Password Filter symbols
      inputs:
        SearchPattern: '$(Build.ArtifactStagingDirectory)/*.pdb'
        IndexSources: false
        SymbolServerType: 'TeamServices'

    - template: templates/codesign.yaml@release_tools
      parameters:
        path:
          - $(Build.ArtifactStagingDirectory)\lithnetpwdf.dll
          - $(Build.ArtifactStagingDirectory)\messages.dll
        environment: 'dev'
        azureSubscription: 'ProductionServicesSubscription'
        description: 'Lithnet Password Protection for Active Directory'

    - task: CmdLine@2
      displayName: Create CAB
      inputs:
        script: |
          makecab $(Build.ArtifactStagingDirectory)\lithnetpwdf.dll $(Build.ArtifactStagingDirectory)\lithnetpwdf.cab

    - template: templates/codesign.yaml@release_tools
      parameters:
        path:
          - $(Build.ArtifactStagingDirectory)\lithnetpwdf.cab
        environment: 'dev'
        azureSubscription: 'ProductionServicesSubscription'
        description: 'Lithnet Password Protection for Active Directory'

    - task: PublishPipelineArtifact@1
      displayName: Publish CAB artifact
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)\lithnetpwdf.cab'
        artifact: 'lpp_filter_for_signing'
        publishLocation: 'pipeline'

    - task: PublishPipelineArtifact@1
      displayName: Publish message DLL artifact
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)\messages.dll'
        artifact: 'eventlog_messages_dll'
        publishLocation: 'pipeline'

    - task: PublishPipelineArtifact@1
      displayName: Publish signing helper script
      inputs:
        targetPath: '$(Build.SourcesDirectory)\build\scripts\Wait-ForSignedFilter.ps1'
        artifact: 'lpp_signing_tools'
        publishLocation: 'pipeline'

    # In dev mode, publish the unsigned DLL as the "MS signed" artifact
    - ${{ if eq(parameters.devMode, true) }}:
      - task: PublishPipelineArtifact@1
        displayName: Publish unsigned filter DLL as MS signed (dev mode)
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)\lithnetpwdf.dll'
          artifact: 'lpp_filter_ms_signed'
          publishLocation: 'pipeline'

# ── Unit tests ─────────────────────────────────────────────────────────
- stage: unit_test_stage
  displayName: Run unit tests
  dependsOn: [build_stage]
  jobs:
  - job: native_tests
    displayName: Native unit tests
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: Download native test binaries
      inputs:
        buildType: 'current'
        artifactName: 'native_test_binaries'
        targetPath: '$(Pipeline.Workspace)\native_test_binaries'

    - task: DownloadPipelineArtifact@2
      displayName: Download PS module for store setup
      inputs:
        buildType: 'current'
        artifactName: 'ps_module_binaries'
        targetPath: '$(Pipeline.Workspace)\ps_module'

    - task: PowerShell@2
      displayName: Setup native test store
      inputs:
        targetType: inline
        script: |
          $storePath = "$(Agent.TempDirectory)\lpp-test-store"
          New-Item -ItemType Directory -Force -Path $storePath | Out-Null
          $policyPath = 'HKLM:\Software\Policies\Lithnet\PasswordFilter'
          New-Item -Path $policyPath -Force | Out-Null
          New-ItemProperty -Path $policyPath -Name 'Store' -Value $storePath -PropertyType String -Force | Out-Null
          New-ItemProperty -Path $policyPath -Name 'CheckPasswordNotInBannedPasswordStoreOnSet' -Value 1 -PropertyType DWord -Force | Out-Null
          New-ItemProperty -Path $policyPath -Name 'CheckPasswordNotInBannedPasswordStoreOnChange' -Value 1 -PropertyType DWord -Force | Out-Null
          New-ItemProperty -Path $policyPath -Name 'CheckNormalizedPasswordNotInBannedPasswordStoreOnSet' -Value 1 -PropertyType DWord -Force | Out-Null
          New-ItemProperty -Path $policyPath -Name 'CheckNormalizedPasswordNotInBannedPasswordStoreOnChange' -Value 1 -PropertyType DWord -Force | Out-Null
          New-ItemProperty -Path $policyPath -Name 'CheckNormalizedPasswordNotInBannedWordStoreOnSet' -Value 1 -PropertyType DWord -Force | Out-Null
          New-ItemProperty -Path $policyPath -Name 'CheckNormalizedPasswordNotInBannedWordStoreOnChange' -Value 1 -PropertyType DWord -Force | Out-Null
          New-Item -Path "$policyPath\UnitTests" -Force | Out-Null
          New-ItemProperty -Path "$policyPath\UnitTests" -Name 'StorePath' -Value $storePath -PropertyType String -Force | Out-Null

          Import-Module "$(Pipeline.Workspace)\ps_module\LithnetPasswordProtection.psd1" -ErrorAction Stop
          Open-Store -Path $storePath -ErrorAction Stop
          Add-CompromisedPassword -Value "password" -ErrorAction Stop
          Add-CompromisedPassword -Value "abacus" -ErrorAction Stop
          Add-BannedWord -Value "abacus" -ErrorAction Stop
          Add-BannedWord -Value "password" -ErrorAction Stop
          Write-Host "Test store created and populated at $storePath"

    - task: PowerShell@2
      displayName: List native test artifact contents
      inputs:
        targetType: inline
        script: |
          Write-Host "Pipeline.Workspace: $(Pipeline.Workspace)"
          Get-ChildItem "$(Pipeline.Workspace)\native_test_binaries" -Recurse | ForEach-Object { Write-Host $_.FullName }

    - task: VisualStudioTestPlatformInstaller@1
      displayName: Install VS Test Platform

    - task: VSTest@3
      displayName: Run native unit tests
      inputs:
        testSelector: 'testAssemblies'
        testAssemblyVer2: |
          $(Pipeline.Workspace)\native_test_binaries\**\NativeUnitTests.dll
          !**\*TestAdapter.dll
          !**\obj\**
        platform: '$(buildPlatform)'
        configuration: '$(buildConfiguration)'
        searchFolder: '$(Pipeline.Workspace)\native_test_binaries'

  - job: managed_tests
    displayName: Managed unit tests
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: Download managed test binaries
      inputs:
        buildType: 'current'
        artifactName: 'managed_test_binaries'
        targetPath: '$(Pipeline.Workspace)\managed_test_binaries'

    - task: PowerShell@2
      displayName: List managed test artifact contents
      inputs:
        targetType: inline
        script: |
          Get-ChildItem "$(Pipeline.Workspace)\managed_test_binaries" -Recurse | ForEach-Object { Write-Host $_.FullName }

    - task: VisualStudioTestPlatformInstaller@1
      displayName: Install VS Test Platform

    - task: VSTest@3
      displayName: Run managed unit tests
      inputs:
        testSelector: 'testAssemblies'
        testAssemblyVer2: |
          $(Pipeline.Workspace)\managed_test_binaries\**\ManagedUnitTests.dll
          !**\*TestAdapter.dll
          !**\obj\**
        searchFolder: '$(Pipeline.Workspace)\managed_test_binaries'
        testFiltercriteria: 'ClassName!=ManagedUnitTests.LsassTests'
        platform: '$(buildPlatform)'
        configuration: '$(buildConfiguration)'

# ── Pause for Microsoft LSA signing ─────────────────────────────────────
- ${{ if eq(parameters.devMode, false) }}:
  - stage: ms_sign_stage
    displayName: Pause for Microsoft LSA Signing
    dependsOn: unit_test_stage
    jobs:
    - job: get_lpp_signed_by_ms
      displayName: Pause for LPP DLL signing by Microsoft
      pool: server
      timeoutInMinutes: 1440 
      steps:
      - task: ManualValidation@0
        timeoutInMinutes: 1440
        inputs:
          notifyUsers: |
            [ad-password-protection]\Project Administrators
            [ad-password-protection]\Build Administrators
          instructions: |
            Run these commands:

            az login --allow-no-subscriptions

            az pipelines runs artifact download --artifact-name lpp_signing_tools --path . --run-id $(Build.BuildId) --organization "$(System.CollectionUri)" --project "$(System.TeamProject)"

            powershell -ExecutionPolicy Bypass -File Wait-ForSignedFilter.ps1 -BuildId $(Build.BuildId) -Organization "$(System.CollectionUri)" -Project "$(System.TeamProject)"

            The script downloads the CAB, opens the LSA signing portal, then watches your Downloads folder for a new signed_*.zip. Once you download the signed ZIP from Microsoft, it uploads automatically. Then resume this validation.

# ── Main build ──────────────────────────────────────────────────────────
- stage: main_build_stage
  displayName: Perform main build
  ${{ if eq(parameters.devMode, true) }}:
    dependsOn: unit_test_stage
  ${{ else }}:
    dependsOn: ms_sign_stage
  jobs:
  - job: main_build
    displayName: Main build
    pool:
      vmImage: 'windows-latest'
    steps:
    - template: templates/checkout.yaml@release_tools

    - task: NuGetToolInstaller@1

    - task: NuGetCommand@2
      inputs:
        restoreSolution: 'src/Lithnet.ActiveDirectory.PasswordProtection.sln'

    - task: DotNetCoreCLI@2
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'src/PasswordProtectionPS/Lithnet.ActiveDirectory.PasswordProtection.PowerShell.csproj'
        arguments: '--configuration $(BuildConfiguration) --output "D:\build\lpp\ps" -p:Version=$(build.version) --framework net472'
        zipAfterPublish: false
        modifyOutputPath: false

    - task: PublishSymbols@2
      displayName: Publish PS Module symbols
      inputs:
        SearchPattern: 'D:\build\lpp\ps\*.pdb'
        SymbolServerType: 'TeamServices'
        IndexSources: false

    - task: PowerShell@2
      displayName: Update PS module manifest version
      inputs:
        targetType: 'inline'
        script: |
          $file = "D:\build\lpp\ps\LithnetPasswordProtection.psd1"
          Update-ModuleManifest -Path $file -ModuleVersion "$(build.version).0"
          Get-Content $file
        failOnStderr: true

    - task: PowerShell@2
      displayName: Build folder structure
      inputs:
        targetType: 'inline'
        script: |
          New-Item "D:\build\lpp\filter" -ItemType Directory
        failOnStderr: true

    - template: templates/codesign.yaml@release_tools
      parameters:
        path:
          - D:\build\lpp\ps\Lithnet*.dll
          - D:\build\lpp\ps\*.psd1
        environment: 'dev'
        azureSubscription: 'ProductionServicesSubscription'
        description: 'Lithnet Password Protection for Active Directory'

    - task: DownloadPipelineArtifact@2
      displayName: Download signed filter artifact
      inputs:
        buildType: 'current'
        artifactName: 'lpp_filter_ms_signed'
        targetPath: 'D:\build\lpp\filter'

    - ${{ if eq(parameters.devMode, false) }}:
      - task: ExtractFiles@1
        displayName: Extract signed filter DLL from ZIP
        inputs:
          archiveFilePatterns: 'D:\build\lpp\filter\*.zip'
          destinationFolder: 'D:\build\lpp\filter'
          cleanDestinationFolder: false

    - task: DownloadPipelineArtifact@2
      displayName: Download messages DLL
      inputs:
        buildType: 'current'
        artifactName: 'eventlog_messages_dll'
        targetPath: 'D:\build\lpp\filter'

    - template: templates/build-advanced-installer-package.yaml@release_tools
      parameters:
        aipPath: '$(Build.SourcesDirectory)\src\Installer\Lithnet Password Protection for Active Directory.aip'
        azureSubscription: 'ProductionServicesSubscription'
        environment: 'dev'
        aipBuild: 'DefaultBuild'
        aipPackageName: '$(installer.fileName)'
        sign: true

    - template: templates/generate-manifest.yaml@release_tools
      parameters:
        artifactName: 'service-win-x64'
        packages:
          - fileName: '$(installer.fileName)'
            description: 'EXE installer'
        packageArchitecture: 'x64'
        packageFormat: 'exe'
        productMetadataDir: '$(Build.SourcesDirectory)/_productMetadata'
        environment: 'dev'
        azureSubscription: 'ProductionServicesSubscription'
        supportedPlatforms:
          - win/server-2016
          - win/server-2019
          - win/server-2022
          - win/server-2025
        description: 'Password Protection for Active Directory (x64)'

    - task: PublishPipelineArtifact@1
      displayName: Publish installer artifact
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: 'service-win-x64'
        publishLocation: 'pipeline'

# ── E2E tests on DC ────────────────────────────────────────────────────
- template: e2e-test-stage.yaml
  parameters:
    devMode: ${{ parameters.devMode }}

# ── Generate release-line files (once, after all builds) ────────────────
- stage: generate_release_data
  displayName: Generate release data
  dependsOn: [e2e_test_stage]
  jobs:
  - template: templates/generate-release-line-files.yaml@release_tools
    parameters:
      azureSubscription: 'ProductionServicesSubscription'
      environment: 'prod'
      productMetadataDir: '$(Build.SourcesDirectory)/_productMetadata'

# ── Publish: dev ────────────────────────────────────────────────────────
- template: publish-packages.yml
  parameters:
    deploymentType: dev
    dependsOn: [generate_release_data]

- template: templates/release-management.yaml@release_tools
  parameters:
    deploymentType: dev
    releaseLine: 'v$(build.version.major).$(build.version.minor)'
    dependsOn: [cdn_purge_dev]

# ── Publish: preview → prod (requires release branch + non-dev mode) ───
- ${{ if and(eq(parameters.devMode, false), eq(variables['build.isRelease'], 'True')) }}:
  - template: publish-packages.yml
    parameters:
      deploymentType: preview
      dependsOn: [release_management_dev]

  - template: templates/release-management.yaml@release_tools
    parameters:
      deploymentType: preview
      releaseLine: 'v$(build.version.major).$(build.version.minor)'
      dependsOn: [cdn_purge_preview]

  - template: publish-packages.yml
    parameters:
      deploymentType: prod
      dependsOn: [release_management_preview]

  - template: templates/release-management.yaml@release_tools
    parameters:
      deploymentType: prod
      releaseLine: 'v$(build.version.major).$(build.version.minor)'
      dependsOn: [cdn_purge_prod]

  # ── GitHub release ──────────────────────────────────────────────────
  - stage: publish_github_release
    displayName: Publish GitHub pre-release
    dependsOn: [cdn_purge_preview]
    jobs:
    - job: publish
      displayName: Create GitHub pre-release
      pool:
        vmImage: 'ubuntu-22.04'
      steps:
      - template: templates/publish-github-release.yaml@release_tools
        parameters:
          gitHubConnection: 'github-connection'
          isPreRelease: true
          repositoryName: 'lithnet/ad-password-protection'

  - stage: promote_github_release
    displayName: Promote GitHub release
    dependsOn: [cdn_purge_prod, publish_github_release]
    jobs:
    - job: promote
      displayName: Promote pre-release to full release
      pool:
        vmImage: 'ubuntu-22.04'
      steps:
      - template: templates/promote-github-release.yaml@release_tools
        parameters:
          gitHubConnection: 'github-connection'
          repositoryName: 'lithnet/ad-password-protection'

  # ── Publish changelog to docs repo ───────────────────────────────────
  - stage: publish_changelog
    displayName: Publish changelog
    dependsOn: [release_management_prod]
    jobs:
    - job: publish
      displayName: Publish changelog to docs repo
      pool:
        vmImage: 'ubuntu-22.04'
      steps:
      - template: templates/checkout.yaml@release_tools
        parameters:
          checkoutSelf: false
      - template: templates/publish-changelog.yaml@release_tools
        parameters:
          docsRepo: 'docs'
