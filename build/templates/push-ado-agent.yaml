parameters:
- name: jobName
  type: string
  default: 'RegisterAgent'
- name: vmName
  type: string
- name: resourceGroup
  type: string
- name: azureSubscription
  type: string
- name: adoEnvironment
  type: string
- name: adoProject
  type: string
  default: 'ad-password-protection'
- name: adoOrganization
  type: string
  default: 'https://dev.azure.com/lithnet/'
- name: agentVersion
  type: string
  default: '4.258.1'
- name: dependsOn
  type: string
  default: ''
- name: timeoutSeconds
  type: number
  default: 600

jobs:
- job: ${{ parameters.jobName }}
  ${{ if ne(parameters.dependsOn, '') }}:
    dependsOn: ${{ parameters.dependsOn }}
  pool:
    vmImage: 'ubuntu-latest'
  timeoutInMinutes: 15
  steps:
  - template: templates/checkout.yaml@release_tools

  - task: AzureCLI@2
    displayName: 'Push ADO agent registration via Run Command'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail

        VM_NAME="${{ parameters.vmName }}"
        RG="${{ parameters.resourceGroup }}"
        PAT="$(System.AccessToken)"

        echo "Registering ADO agent on $VM_NAME..."

        OUTPUT=$(az vm run-command invoke \
          --resource-group "$RG" \
          --name "$VM_NAME" \
          --command-id RunPowerShellScript \
          --scripts @"$(Build.SourcesDirectory)/build/scripts/Install-AdoAgent.ps1" \
          --parameters \
            "pat=$PAT" \
            "environmentName=${{ parameters.adoEnvironment }}" \
            "projectName=${{ parameters.adoProject }}" \
            "organizationUrl=${{ parameters.adoOrganization }}" \
            "agentVersion=${{ parameters.agentVersion }}" \
          -o json)

        echo "$OUTPUT" | jq -r '.value[] | select(.code | contains("StdOut")) | .message' || true
        STDERR=$(echo "$OUTPUT" | jq -r '.value[] | select(.code | contains("StdErr")) | .message' 2>/dev/null)

        if [ -n "$STDERR" ]; then
          echo "##[error]Agent registration failed on the VM:"
          echo "$STDERR"
          exit 1
        fi

        echo "Agent registration completed."

  - template: templates/wait-for-agents-online.yaml@release_tools
    parameters:
      mode: environment
      environmentName: ${{ parameters.adoEnvironment }}
      agentNames: ${{ parameters.vmName }}
      timeoutSeconds: ${{ parameters.timeoutSeconds }}
