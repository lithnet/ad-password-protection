parameters:
- name: jobName
  type: string
  default: 'RegisterAgent'
- name: vmName
  type: string
- name: resourceGroup
  type: string
- name: azureSubscription
  type: string
- name: adoEnvironment
  type: string
- name: adoProject
  type: string
  default: 'password-protection'
- name: adoOrganization
  type: string
  default: 'https://dev.azure.com/lithnet/'
- name: agentVersion
  type: string
  default: '4.258.1'
- name: dependsOn
  type: string
  default: ''
- name: timeoutSeconds
  type: number
  default: 600

jobs:
- job: ${{ parameters.jobName }}
  ${{ if ne(parameters.dependsOn, '') }}:
    dependsOn: ${{ parameters.dependsOn }}
  pool:
    vmImage: 'ubuntu-latest'
  timeoutInMinutes: 15
  steps:
  - template: templates/checkout.yaml@release_tools
    parameters:
      checkoutSelf: false

  - task: AzureCLI@2
    displayName: 'Push ADO agent registration via Run Command'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail

        VM_NAME="${{ parameters.vmName }}"
        RG="${{ parameters.resourceGroup }}"
        PAT="$(System.AccessToken)"

        echo "Registering ADO agent on $VM_NAME..."

        SCRIPT=$(cat <<'PWSH'
        $ErrorActionPreference = "Stop"
        $agentDir = "C:\azagent\A1"
        $agentVersion = "__AGENT_VERSION__"
        $vmName = "__VM_NAME__"

        if (Test-Path "$agentDir\.agent") {
            Write-Host "Removing existing agent registration..."
            & "$agentDir\config.cmd" remove --unattended --auth pat --token $args[0] 2>&1 | Write-Host
        }
        if (-not (Test-Path "$agentDir\config.cmd")) {
            Write-Host "Downloading agent v$agentVersion..."
            New-Item -ItemType Directory -Force -Path $agentDir | Out-Null
            $zip = "$env:TEMP\agent.zip"
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
            (New-Object Net.WebClient).DownloadFile("https://download.agent.dev.azure.com/agent/$agentVersion/vsts-agent-win-x64-$agentVersion.zip", $zip)
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            [IO.Compression.ZipFile]::ExtractToDirectory($zip, $agentDir)
            Remove-Item $zip
        }
        Write-Host "Configuring agent..."
        & "$agentDir\config.cmd" --unattended --replace --agent $vmName --url "__ADO_ORG__" --auth pat --token $args[0] --environment "__ADO_ENV__" --projectname "__ADO_PROJECT__" --addvirtualmachineresourcetags --virtualmachineresourcetags "role:dc,product:lpp" --runAsService --windowsLogonAccount "NT AUTHORITY\SYSTEM" 2>&1 | Write-Host
        if ($LASTEXITCODE -ne 0) { throw "Agent configuration failed with exit code $LASTEXITCODE" }
        Write-Host "Agent registered and service started."
        PWSH
        )

        SCRIPT="${SCRIPT//__AGENT_VERSION__/${{ parameters.agentVersion }}}"
        SCRIPT="${SCRIPT//__VM_NAME__/$VM_NAME}"
        SCRIPT="${SCRIPT//__ADO_ORG__/${{ parameters.adoOrganization }}}"
        SCRIPT="${SCRIPT//__ADO_ENV__/${{ parameters.adoEnvironment }}}"
        SCRIPT="${SCRIPT//__ADO_PROJECT__/${{ parameters.adoProject }}}"

        OUTPUT=$(az vm run-command invoke \
          --resource-group "$RG" \
          --name "$VM_NAME" \
          --command-id RunPowerShellScript \
          --scripts "$SCRIPT" \
          --parameters "pat=$PAT" \
          -o json)

        echo "$OUTPUT" | jq -r '.value[] | select(.code | contains("StdOut")) | .message' || true
        STDERR=$(echo "$OUTPUT" | jq -r '.value[] | select(.code | contains("StdErr")) | .message' 2>/dev/null)

        if [ -n "$STDERR" ]; then
          echo "##[error]Agent registration failed on the VM:"
          echo "$STDERR"
          exit 1
        fi

        echo "Agent registration completed."

  - template: templates/wait-for-agents-online.yaml@release_tools
    parameters:
      mode: environment
      environmentName: ${{ parameters.adoEnvironment }}
      agentNames: ${{ parameters.vmName }}
      timeoutSeconds: ${{ parameters.timeoutSeconds }}
