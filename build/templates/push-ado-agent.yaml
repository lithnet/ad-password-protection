parameters:
- name: jobName
  type: string
  default: 'RegisterAgent'
- name: vmName
  type: string
- name: resourceGroup
  type: string
- name: azureSubscription
  type: string
- name: adoEnvironment
  type: string
- name: adoProject
  type: string
  default: 'password-protection'
- name: adoOrganization
  type: string
  default: 'https://dev.azure.com/lithnet/'
- name: agentVersion
  type: string
  default: '4.258.1'
- name: dependsOn
  type: string
  default: ''
- name: timeoutSeconds
  type: number
  default: 600

jobs:
- job: ${{ parameters.jobName }}
  ${{ if ne(parameters.dependsOn, '') }}:
    dependsOn: ${{ parameters.dependsOn }}
  pool:
    vmImage: 'ubuntu-latest'
  timeoutInMinutes: 15
  steps:
  - template: templates/checkout.yaml@release_tools
    parameters:
      checkoutSelf: false

  - task: AzureCLI@2
    displayName: 'Push ADO agent registration via Run Command'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail

        VM_NAME="${{ parameters.vmName }}"
        RG="${{ parameters.resourceGroup }}"
        ADO_ORG="${{ parameters.adoOrganization }}"
        ADO_PROJECT="${{ parameters.adoProject }}"
        ADO_ENV="${{ parameters.adoEnvironment }}"
        AGENT_VERSION="${{ parameters.agentVersion }}"
        PAT="$(System.AccessToken)"

        echo "Registering ADO agent on $VM_NAME..."

        az vm run-command invoke \
          --resource-group "$RG" \
          --name "$VM_NAME" \
          --command-id RunPowerShellScript \
          --scripts \
            'param($pat, $org, $project, $env, $agentVersion, $vmName)' \
            '$agentDir = "C:\azagent\A1"' \
            'if (Test-Path "$agentDir\.agent") {' \
            '    Write-Host "Removing existing agent registration..."' \
            '    & "$agentDir\config.cmd" remove --unattended --auth pat --token $pat 2>&1 | Write-Host' \
            '}' \
            'if (-not (Test-Path "$agentDir\config.cmd")) {' \
            '    Write-Host "Downloading agent v$agentVersion..."' \
            '    New-Item -ItemType Directory -Force -Path $agentDir | Out-Null' \
            '    $zip = "$env:TEMP\agent.zip"' \
            '    [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12' \
            '    (New-Object Net.WebClient).DownloadFile("https://vstsagentpackage.azureedge.net/agent/$agentVersion/vsts-agent-win-x64-$agentVersion.zip", $zip)' \
            '    Add-Type -AssemblyName System.IO.Compression.FileSystem' \
            '    [IO.Compression.ZipFile]::ExtractToDirectory($zip, $agentDir)' \
            '    Remove-Item $zip' \
            '}' \
            'Write-Host "Configuring agent..."' \
            '& "$agentDir\config.cmd" --unattended --replace --url $org --auth pat --token $pat --environment $env --projectname $project --addvirtualmachineresourcetags --virtualmachineresourcetags "role:dc,product:lpp" --runAsService --windowsLogonAccount "NT AUTHORITY\SYSTEM" 2>&1 | Write-Host' \
            'if ($LASTEXITCODE -ne 0) { throw "Agent configuration failed with exit code $LASTEXITCODE" }' \
            'Write-Host "Agent registered and service started."' \
          --parameters \
            "pat=$PAT" \
            "org=$ADO_ORG" \
            "project=$ADO_PROJECT" \
            "env=$ADO_ENV" \
            "agentVersion=$AGENT_VERSION" \
            "vmName=$VM_NAME"

        echo "Agent registration pushed successfully."

  - template: templates/wait-for-agents-online.yaml@release_tools
    parameters:
      mode: environment
      environmentName: ${{ parameters.adoEnvironment }}
      agentNames: ${{ parameters.vmName }}
      timeoutSeconds: ${{ parameters.timeoutSeconds }}
