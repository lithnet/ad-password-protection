parameters:
- name: vmName
  type: string
  default: 't3ws2025x64-dc'
- name: resourceGroup
  type: string
  default: 'rg-ams-testhosts'
- name: snapshotName
  type: string
  default: 't3ws2025x64-dc-baseline'
- name: diskPrefix
  type: string
  default: 't3ws2025x64-dc-osdisk'
- name: diskSku
  type: string
  default: 'StandardSSD_LRS'
- name: azureSubscription
  type: string
  default: 'DevEnvironment'
- name: adoEnvironment
  type: string
  default: 'TestEnv3'
- name: adoProject
  type: string
  default: 'ad-password-protection'
- name: initialWaitSeconds
  type: number
  default: 60
- name: agentTimeoutSeconds
  type: number
  default: 600
- name: devMode
  type: boolean
  default: false

stages:
- stage: e2e_test_stage
  displayName: E2E tests on DC
  dependsOn: main_build_stage
  jobs:

  # 1. Restore the DC to a clean baseline from snapshot
  - template: templates/restore-vm-from-snapshot.yaml@release_tools
    parameters:
      jobName: RestoreTestDc
      vmName: ${{ parameters.vmName }}
      resourceGroup: ${{ parameters.resourceGroup }}
      snapshotName: ${{ parameters.snapshotName }}
      diskPrefix: ${{ parameters.diskPrefix }}
      diskSku: ${{ parameters.diskSku }}
      azureSubscription: ${{ parameters.azureSubscription }}

  # 2. Push ADO agent registration and wait for it to come online
  - template: templates/push-ado-agent.yaml
    parameters:
      jobName: RegisterAgent
      vmName: ${{ parameters.vmName }}
      resourceGroup: ${{ parameters.resourceGroup }}
      azureSubscription: ${{ parameters.azureSubscription }}
      adoEnvironment: ${{ parameters.adoEnvironment }}
      adoProject: ${{ parameters.adoProject }}
      dependsOn: RestoreTestDc
      timeoutSeconds: ${{ parameters.agentTimeoutSeconds }}

  # 3. Install the MSI, configure filter policy, and import test data
  - deployment: InstallFilter
    displayName: Install LPP and configure filter
    dependsOn: RegisterAgent
    environment:
      name: ${{ parameters.adoEnvironment }}
      resourceType: VirtualMachine
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - download: current
            artifact: service-win-x64
            displayName: Download MSI artifact

          - task: PowerShell@2
            displayName: Create AD objects, store, and test data
            inputs:
              targetType: filePath
              filePath: $(Build.SourcesDirectory)\src\PasswordProtectionPS\Tests\Initialize-TestEnvironment.ps1
              arguments: -StorePath 'C:\Password-Protection\store'

          - task: PowerShell@2
            displayName: Install LPP MSI
            inputs:
              targetType: inline
              script: |
                $msi = Get-ChildItem "$(Pipeline.Workspace)\service-win-x64" -Filter "*.exe" -Recurse | Select-Object -First 1
                if (-not $msi) { throw "No installer found in artifact" }

                Write-Host "Installing $($msi.FullName)..."
                $process = Start-Process $msi.FullName -ArgumentList '/exenoui /quiet /qn /norestart' -Wait -PassThru
                if ($process.ExitCode -ne 0) { throw "Installer failed with exit code $($process.ExitCode)" }

                $store = (Get-ItemProperty 'HKLM:\Software\Lithnet\PasswordFilter' -ErrorAction Stop).Store.TrimEnd('\')
                Write-Host "Store path after install: $store"
                if ($store -ne 'C:\Password-Protection\store') {
                    throw "Installer overwrote store path. Expected 'C:\Password-Protection\store', got '$store'"
                }
              failOnStderr: false

          - task: PowerShell@2
            displayName: Verify installed files
            inputs:
              targetType: inline
              script: |
                $modulePath = 'C:\Program Files\WindowsPowerShell\Modules\LithnetPasswordProtection'
                $requiredFiles = @(
                    'LithnetPasswordProtection.dll',
                    'Lithnet.ActiveDirectory.PasswordProtection.dll',
                    'Polly.dll',
                    'Polly.Extensions.Http.dll',
                    'Microsoft.Extensions.Http.Polly.dll',
                    'LithnetPasswordProtection.psd1'
                )

                foreach ($file in $requiredFiles) {
                    $path = Join-Path $modulePath $file
                    if (-not (Test-Path $path)) { throw "Required file missing: $file" }
                }
                Write-Host "All required files present."

          - task: PowerShell@2
            displayName: Import test data into store
            inputs:
              targetType: filePath
              filePath: $(Build.SourcesDirectory)\src\PasswordProtectionPS\Tests\Import-TestData.ps1
              arguments: -StorePath 'C:\Password-Protection\store'

          - task: PowerShell@2
            displayName: Configure password filter group policy
            inputs:
              targetType: inline
              script: |
                $policyPath = 'HKLM:\Software\Policies\Lithnet\PasswordFilter\default'
                New-Item -Path $policyPath -Force | Out-Null

                Set-ItemProperty -Path $policyPath -Name 'Disabled' -Value 0 -Type DWord
                Set-ItemProperty -Path $policyPath -Name 'CheckPasswordNotInBannedPasswordStoreOnSet' -Value 1 -Type DWord
                Set-ItemProperty -Path $policyPath -Name 'CheckPasswordNotInBannedPasswordStoreOnChange' -Value 1 -Type DWord
                Set-ItemProperty -Path $policyPath -Name 'CheckNormalizedPasswordNotInBannedPasswordStoreOnSet' -Value 1 -Type DWord
                Set-ItemProperty -Path $policyPath -Name 'CheckNormalizedPasswordNotInBannedPasswordStoreOnChange' -Value 1 -Type DWord
                Set-ItemProperty -Path $policyPath -Name 'CheckNormalizedPasswordNotInBannedWordStoreOnSet' -Value 1 -Type DWord
                Set-ItemProperty -Path $policyPath -Name 'CheckNormalizedPasswordNotInBannedWordStoreOnChange' -Value 1 -Type DWord

                Write-Host "Policy configured at $policyPath"
                Get-ItemProperty -Path $policyPath | Format-List

          - task: PowerShell@2
            displayName: Configure LSASS PPL mode
            inputs:
              targetType: inline
              script: |
                $pplValue = if ('${{ parameters.devMode }}' -eq 'true') { 0 } else { 1 }
                Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Lsa' -Name 'RunAsPPL' -Value $pplValue -Type DWord
                $mode = if ($pplValue -eq 1) { 'ENABLED (production)' } else { 'DISABLED (devMode)' }
                Write-Host "LSASS PPL: $mode"

  # 4. Reboot the DC so the filter loads into LSASS
  - template: templates/azure-vm-restart.yaml@release_tools
    parameters:
      jobName: RestartTestDc
      vmName: ${{ parameters.vmName }}
      resourceGroup: ${{ parameters.resourceGroup }}
      azureSubscription: ${{ parameters.azureSubscription }}
      initialWaitSeconds: ${{ parameters.initialWaitSeconds }}
      dependsOn: InstallFilter

  # 5. Wait for the ADO agent to reconnect after reboot
  - job: WaitForAgent
    displayName: Wait for agent after reboot
    dependsOn: RestartTestDc
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - template: templates/checkout.yaml@release_tools
      parameters:
        checkoutSelf: false
    - template: templates/wait-for-agents-online.yaml@release_tools
      parameters:
        mode: environment
        environmentName: ${{ parameters.adoEnvironment }}
        agentNames: ${{ parameters.vmName }}
        timeoutSeconds: ${{ parameters.agentTimeoutSeconds }}

  # 6. Run ALL Pester E2E tests
  - deployment: E2ETests
    displayName: Run E2E Pester tests
    dependsOn: WaitForAgent
    environment:
      name: ${{ parameters.adoEnvironment }}
      resourceType: VirtualMachine
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: PowerShell@2
            displayName: Install Pester 5
            inputs:
              targetType: inline
              script: |
                Install-Module Pester -Force -SkipPublisherCheck -MinimumVersion 5.0.0

          - ${{ if ne(parameters.devMode, true) }}:
            - task: PowerShell@2
              displayName: Verify PPL is enabled
              inputs:
                targetType: inline
                script: |
                  $runAsPPL = (Get-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Lsa' -ErrorAction Stop).RunAsPPL
                  if ($runAsPPL -ne 1) {
                      throw "PPL is not enabled (RunAsPPL=$runAsPPL). Production builds require LSASS PPL mode."
                  }
                  Write-Host "PPL is enabled (RunAsPPL=$runAsPPL)."

          - task: PowerShell@2
            displayName: Run Pester tests
            inputs:
              targetType: inline
              script: |
                $env:LPP_EXPECTED_VERSION = '$(build.version).0'

                $testPath = '$(Build.SourcesDirectory)\src\PasswordProtectionPS\Tests'
                $resultsPath = '$(Agent.TempDirectory)\pester-results.xml'

                $config = New-PesterConfiguration
                $config.Run.Path = $testPath
                $config.Run.Exit = $true
                $config.TestResult.Enabled = $true
                $config.TestResult.OutputPath = $resultsPath
                $config.TestResult.OutputFormat = 'NUnitXml'
                $config.Output.Verbosity = 'Detailed'

                Invoke-Pester -Configuration $config
              failOnStderr: false

          - task: PublishTestResults@2
            displayName: Publish Pester test results
            condition: always()
            inputs:
              testResultsFormat: 'NUnit'
              testResultsFiles: '$(Agent.TempDirectory)/pester-results.xml'
              testRunTitle: 'LPP E2E Tests'
              failTaskOnFailedTests: true

  # 7. Always deallocate the DC
  - template: templates/azure-vm-stop.yaml@release_tools
    parameters:
      jobName: DeallocateTestDc
      deployEnvironment: ${{ parameters.adoEnvironment }}
      distroType: 'win'
      resourceGroup: ${{ parameters.resourceGroup }}
      azureSubscription: ${{ parameters.azureSubscription }}
      dependsOn: E2ETests
